<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Datadesh | Controle Financeiro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f4f6f9;
            --card-bg: rgba(255, 255, 255, 0.8);
            --glass: rgba(255, 255, 255, 0.7);
            --text: #1e293b;
            --text-light: #64748b;
            --border: rgba(255, 255, 255, 0.5);
            --primary: #4f46e5;
            --secondary: #7c3aed;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
        }
        body.dark {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --glass: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.05) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        /* Animações */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        
        /* LOGIN PREMIUM */
        .login-screen {
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            position: relative; overflow: hidden;
        }
        .login-bg-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 50%);
        }
        .login-card {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-radius: 30px; padding: 50px 40px; width: 100%; max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); position: relative; z-index: 1;
            animation: fadeIn 0.6s ease;
        }
        .login-card .logo { text-align: center; margin-bottom: 20px; font-size: 3rem; }
        .login-card h1 { text-align: center; font-size: 1.8rem; font-weight: 800; color: #1e1b4b; margin-bottom: 5px; }
        .login-card .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; font-weight: 500; }
        .input-group { margin-bottom: 20px; }
        .input-group label { font-size: 0.75rem; font-weight: 700; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
        .input-group input {
            width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 15px;
            font-size: 1rem; transition: all 0.3s; background: #f8fafc;
        }
        .input-group input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79,70,229,0.1); }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 1rem;
            font-weight: 700; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; box-shadow: 0 10px 25px rgba(79,70,229,0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(79,70,229,0.6); }
        
        /* LAYOUT PRINCIPAL */
        .container { max-width: 1440px; margin: 0 auto; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .glass-card {
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border);
            border-radius: 24px; padding: 24px; box-shadow: var(--shadow); transition: all 0.3s;
        }
        .glass-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-value { font-size: 2rem; font-weight: 800; }
        
        .tab-bar {
            display: flex; gap: 8px; margin-bottom: 30px; background: var(--glass);
            backdrop-filter: blur(12px); padding: 8px; border-radius: 20px; flex-wrap: wrap;
        }
        .tab {
            flex: 1; padding: 12px 20px; border: none; border-radius: 15px; background: transparent;
            color: var(--text-light); font-weight: 600; cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }
        .tab.active { background: #4f46e5; color: white; box-shadow: 0 5px 15px rgba(79,70,229,0.3); }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .gasto-card { position: relative; border-left: 6px solid #4f46e5; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); justify-content: center;
            align-items: center; z-index: 9999;
        }
        .modal.show { display: flex; }
        .modal-content { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 30px; padding: 35px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; animation: fadeIn 0.3s ease; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group label { font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); margin-bottom: 5px; display: block; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); }
        
        .btn-sm { padding: 8px 16px; font-size: 0.8rem; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-success { background: #059669; color: white; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-warning { background: #d97706; color: white; }
        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column; gap:20px;">
    <div class="spinner" style="width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
    <p style="color:white; font-weight:bold;">Carregando...</p>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
    <div class="login-bg-pattern"></div>
    <div class="login-card">
        <div class="logo">🏦</div>
        <h1>Datadesh Finance</h1>
        <p class="subtitle">Controle Financeiro Familiar Premium</p>
        <div class="input-group"><label>Nome Completo</label><input type="text" id="loginNome" placeholder="Seu nome"></div>
        <div class="input-group"><label>CPF</label><input type="text" id="loginCPF" placeholder="00000000000" maxlength="11"></div>
        <div class="input-group"><label>Senha (Admin)</label><input type="password" id="loginSenha" placeholder="Senha"></div>
        <button class="btn btn-primary" id="btnLogin">🔐 ACESSAR SISTEMA</button>
    </div>
</div>

<!-- PAINEL PRINCIPAL -->
<div id="mainScreen" class="hidden">
    <div class="container">
        <div class="header">
            <h1>🏦 Datadesh Finance</h1>
            <div style="display:flex; gap:10px;">
                <button id="btnTheme" class="btn-sm" style="background:var(--glass); color:var(--text);">🌙</button>
                <button id="btnLogout" class="btn-sm btn-danger">🚪 Sair</button>
            </div>
        </div>
        <div id="userBar" class="glass-card" style="margin-bottom:20px; display:flex; justify-content:space-between;"></div>
        <div class="stats-grid" id="statsGrid"></div>
        
        <!-- BOTÃO ADMIN (SÓ ADMINS VEEM) -->
        <div id="adminPanel" class="hidden" style="margin-bottom:20px;">
            <button class="btn btn-primary" id="btnAdminCartoes" style="width:auto; margin-right:10px;">💳 Gerenciar Cartões</button>
            <button class="btn btn-primary" id="btnAdminBaixas" style="width:auto; margin-right:10px;">✅ Dar Baixas</button>
            <button class="btn btn-primary" id="btnExportExcel" style="width:auto;">📊 Exportar Excel</button>
        </div>
        
        <!-- ABAS -->
        <div class="tab-bar" id="tabBar">
            <button class="tab active" data-tab="todos">📋 Todos</button>
            <button class="tab" data-tab="fixas">💰 Contas Fixas</button>
            <button class="tab" data-tab="graficos">📊 Gráficos</button>
        </div>
        <div id="tabContent"></div>
        <div id="pagination" style="display:flex; justify-content:center; gap:10px; margin-top:20px;"></div>
    </div>
</div>
<script>
// CONFIGURAÇÃO
const SUPABASE_URL = 'https://wzrsxzhdfmbccicluytb.supabase.co';
const SUPABASE_KEY = 'sb_publishable__OGAIY97ObenG-digw9E1Q_4SkuMJkF';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ESTADO GLOBAL
let usuarioLogado = null;
let isAdmin = false;
let tabAtual = 'todos';
let paginaAtual = 1;
const ITENS_POR_PAGINA = 6;
let todosGastos = [];
let categoriasCache = [];
let cartoesCache = [];
let usuariosCache = [];

// UTILITÁRIOS
function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
function formatarData(d) { return d ? new Date(d).toLocaleDateString('pt-BR') : '—'; }
function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    if (cpf.length !== 11) return false;
    return true; // Validação simplificada para MVP
}

// BANCO DE DADOS
async function buscarDados() {
    if (!usuarioLogado) return;
    const [catRes, cartRes, userRes, gastosRes] = await Promise.all([
        supabase.from('categorias').select('*'),
        supabase.from('cartoes').select('*').eq('admin_id', usuarioLogado.id),
        supabase.from('usuarios').select('*'),
        supabase.from('gastos').select('*').eq('admin_id', usuarioLogado.id).order('data_compra', { ascending: false })
    ]);
    categoriasCache = catRes.data || [];
    cartoesCache = cartRes.data || [];
    usuariosCache = userRes.data || [];
    todosGastos = gastosRes.data || [];
}

// RENDERIZAÇÃO
function renderizarStats() {
    const ativos = todosGastos.filter(g => g.status === 'ativo');
    const total = ativos.reduce((s, g) => s + parseFloat(g.valor_total), 0);
    document.getElementById('statsGrid').innerHTML = `
        <div class="glass-card fade-in"><p>💸 Gastos Ativos</p><p class="stat-value" style="color:#dc2626;">R$ ${total.toFixed(2)}</p></div>
        <div class="glass-card fade-in"><p>💳 Cartões</p><p class="stat-value" style="color:#4f46e5;">${cartoesCache.length}</p></div>
        <div class="glass-card fade-in"><p>👥 Pessoas</p><p class="stat-value" style="color:#059669;">${usuariosCache.length}</p></div>
    `;
}

function renderizarAbas() {
    const container = document.getElementById('tabContent');
    let dados = [...todosGastos];
    
    if (tabAtual === 'fixas') dados = dados.filter(g => g.recorrente === true);
    if (tabAtual === 'graficos') {
        container.innerHTML = '<div class="glass-card" style="height:400px;"><canvas id="graficoPizza"></canvas></div>';
        setTimeout(renderizarGrafico, 100);
        return;
    }
    
    const totalPag = Math.ceil(dados.length / ITENS_POR_PAGINA);
    const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
    const paginados = dados.slice(inicio, inicio + ITENS_POR_PAGINA);
    
    container.innerHTML = `<div class="card-grid">${paginados.map(g => {
        const cat = categoriasCache.find(c => c.id == g.categoria_id);
        const cart = cartoesCache.find(c => c.id == g.cartao_id);
        const user = usuariosCache.find(u => u.id == g.usuario_id);
        return `
            <div class="glass-card gasto-card fade-in" style="border-left-color: ${cart ? cart.cor : '#4f46e5'};">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${cat ? cat.icone + ' ' + cat.nome : '📦 Outros'}</strong>
                    <strong style="color:#dc2626;">R$ ${parseFloat(g.valor_total).toFixed(2)}</strong>
                </div>
                ${g.descricao ? `<p style="color:var(--text-light); margin:5px 0;">📝 ${g.descricao}</p>` : ''}
                <div style="display:flex; gap:15px; font-size:0.8rem; color:var(--text-light); margin-top:10px;">
                    <span>💳 ${cart ? cart.nome_cartao : 'Sem cartão'}</span>
                    <span>👤 ${user ? user.nome : 'N/D'}</span>
                    <span>📅 ${formatarData(g.data_compra)}</span>
                </div>
                <div style="margin-top:10px; display:flex; gap:5px;">
                    ${isAdmin ? `<button class="btn-sm btn-danger" onclick="excluirGasto(${g.id})">🗑️</button>
                    <button class="btn-sm btn-success" onclick="abrirWhatsApp(${g.id})">📲</button>` : ''}
                </div>
            </div>
        `}).join('')}</div>`;
    
    // Paginação
    let pagHTML = '';
    for (let i = 1; i <= totalPag; i++) {
        pagHTML += `<button onclick="paginaAtual=${i}; renderizarAbas();" class="btn-sm" style="${i === paginaAtual ? 'background:#4f46e5; color:white;' : 'background:var(--glass);'}">${i}</button>`;
    }
    document.getElementById('pagination').innerHTML = pagHTML;
}

function renderizarGrafico() {
    const ctx = document.getElementById('graficoPizza')?.getContext('2d');
    if (!ctx) return;
    const dados = {};
    todosGastos.filter(g => g.status === 'ativo').forEach(g => {
        const cat = categoriasCache.find(c => c.id == g.categoria_id);
        const nome = cat ? cat.nome : 'Outros';
        dados[nome] = (dados[nome] || 0) + parseFloat(g.valor_total);
    });
    new Chart(ctx, { type: 'pie', data: { labels: Object.keys(dados), datasets: [{ data: Object.values(dados) }] } });
}

// AÇÕES ADMIN
async function excluirGasto(id) {
    if (!confirm('Excluir este gasto?')) return;
    await supabase.from('gastos').delete().eq('id', id);
    alert('✅ Excluído!');
    location.reload();
}

function abrirWhatsApp(id) {
    const g = todosGastos.find(x => x.id == id);
    const user = usuariosCache.find(u => u.id == g.usuario_id);
    alert(`📲 Enviar WhatsApp para ${user ? user.nome : 'responsável'}\nValor: R$ ${g.valor_total}`);
}

// LOGIN
document.getElementById('btnLogin').addEventListener('click', async () => {
    const nome = document.getElementById('loginNome').value.trim();
    const cpf = document.getElementById('loginCPF').value.trim();
    const senha = document.getElementById('loginSenha').value.trim();
    
    if (!nome || !validarCPF(cpf)) return alert('Preencha corretamente!');
    
    showLoading();
    // Admin
    if (cpf === '12345678909' && senha === 'admin') {
        usuarioLogado = { id: 1, nome: 'Admin', cpf, tipo: 'admin' };
        isAdmin = true;
    } else {
        // Usuário comum
        let { data: user } = await supabase.from('usuarios').select('*').eq('cpf', cpf).single();
        if (!user) {
            const { data: novo } = await supabase.from('usuarios').insert([{ nome, cpf, tipo: 'comum' }]).select().single();
            user = novo;
        }
        usuarioLogado = user;
        isAdmin = user.tipo === 'admin';
    }
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    if (isAdmin) document.getElementById('adminPanel').classList.remove('hidden');
    
    document.getElementById('userBar').innerHTML = `<span>👤 ${usuarioLogado.nome} (${isAdmin ? 'Admin' : 'Usuário'})</span>`;
    await buscarDados();
    renderizarStats();
    renderizarAbas();
    hideLoading();
});

// EVENTOS
document.getElementById('btnLogout').addEventListener('click', () => location.reload());
document.getElementById('btnTheme').addEventListener('click', () => document.body.classList.toggle('dark'));
document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        tabAtual = t.dataset.tab;
        paginaAtual = 1;
        renderizarAbas();
    });
});
document.getElementById('btnExportExcel').addEventListener('click', () => {
    const ws = XLSX.utils.json_to_sheet(todosGastos.map(g => ({
        Categoria: categoriasCache.find(c => c.id == g.categoria_id)?.nome || '',
        Descrição: g.descricao,
        Valor: g.valor_total,
        Cartão: cartoesCache.find(c => c.id == g.cartao_id)?.nome_cartao || '',
        Data: g.data_compra
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Gastos");
    XLSX.writeFile(wb, 'relatorio_financeiro.xlsx');
});
</script>
</body>
</html>
<!-- MODALS -->
<div class="modal" id="modalGasto"><div class="modal-content" id="modalGastoContent"></div></div>
<div class="modal" id="modalCartao"><div class="modal-content" id="modalCartaoContent"></div></div>
