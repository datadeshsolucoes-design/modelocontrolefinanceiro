<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Meu Financeiro - Controle Pessoal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-light: #666;
            --border: #e1e5eb;
            --primary: #4a6cf7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            transition: all 0.3s ease;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .login-screen {
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .login-card {
            background: white; border-radius: 20px; padding: 40px; width: 100%;
            max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        .login-card h1 { text-align: center; color: #4a6cf7; margin-bottom: 8px; font-size: 2rem; }
        .login-card p { text-align: center; color: #666; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: #333; }
        .input-group input {
            width: 100%; padding: 12px 15px; border: 2px solid #e1e5eb;
            border-radius: 10px; font-size: 1rem; transition: all 0.3s; background: #f8fafc;
        }
        .input-group input:focus { outline: none; border-color: #4a6cf7; background: white; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-primary { background: #4a6cf7; color: white; }
        .btn-primary:hover { background: #3651d6; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: #000; margin-top: 8px; }
        .btn-danger { background: #ef4444; color: white; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; flex-wrap: wrap; gap: 15px;
        }
        .header h1 {
            background: linear-gradient(135deg, #4a6cf7, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }
        .theme-toggle {
            background: var(--card); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-weight: 600; color: var(--text); box-shadow: var(--shadow);
        }
        .user-bar {
            background: var(--card); padding: 15px 25px; border-radius: 12px;
            margin-bottom: 24px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: var(--shadow); flex-wrap: wrap; gap: 15px;
        }
        .badge {
            padding: 6px 16px; border-radius: 50px; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase;
        }
        .badge-admin { background: #fef3c7; color: #92400e; }
        .btn-logout {
            background: #ef4444; color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card); padding: 20px; border-radius: 12px;
            box-shadow: var(--shadow); border-left: 4px solid #4a6cf7;
        }
        .stat-label { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #4a6cf7; margin-top: 5px; }
        .controls {
            background: var(--card); padding: 15px; border-radius: 12px;
            margin-bottom: 20px; box-shadow: var(--shadow);
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
        }
        .controls select, .controls input {
            padding: 10px; border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg); color: var(--text);
        }
        .btn-sm {
            padding: 10px 18px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; font-size: 0.85rem;
        }
        .tabs-and-view { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab {
            padding: 12px 24px; border: none; border-radius: 50px;
            background: var(--card); color: var(--text); font-weight: 600;
            cursor: pointer; box-shadow: var(--shadow);
        }
        .tab.active { background: #4a6cf7; color: white; }
        .view-toggle { display: flex; gap: 4px; background: var(--border); padding: 4px; border-radius: 10px; }
        .view-btn {
            width: 42px; height: 42px; border: none; border-radius: 8px;
            background: transparent; color: var(--text-light); font-size: 1.2rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .view-btn.active { background: #6c5ce7; color: white; }
        .admin-section { margin-bottom: 24px; }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .admin-nav button {
            padding: 12px 24px; border: none; border-radius: 12px;
            background: var(--card); color: var(--text); font-weight: 600;
            cursor: pointer; box-shadow: var(--shadow);
        }
        .admin-nav button.active { background: #4a6cf7; color: white; }
        .form-panel { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: var(--shadow); display: none; }
        .form-panel.active { display: block; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 5px; color: var(--text-light); text-transform: uppercase; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 8px; background: var(--bg); color: var(--text);
        }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .item-card {
            background: var(--card); padding: 20px; border-radius: 12px;
            box-shadow: var(--shadow); border-left: 4px solid #4a6cf7;
        }
        .item-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-card-title { font-weight: 700; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4a6cf7, #10b981); border-radius: 10px; transition: width 0.5s; }
        .table-container { overflow-x: auto; background: var(--card); border-radius: 12px; box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        thead { background: #4a6cf7; color: white; }
        th { padding: 12px 16px; text-align: left; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 10px 16px; border-bottom: 1px solid var(--border); }
        .pagination { display: flex; justify-content: center; gap: 8px; padding: 20px; flex-wrap: wrap; }
        .pagination button {
            padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
            background: var(--card); color: var(--text); font-weight: 600; cursor: pointer;
        }
        .pagination button.active { background: #4a6cf7; color: white; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .hidden { display: none !important; }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center;
            z-index: 9999; flex-direction: column;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: white; margin-top: 15px; font-weight: 600; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Carregando...</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>💰 Meu Financeiro</h1>
        <p>Controle completo da sua vida financeira</p>
        <div class="input-group"><label>Nome Completo</label><input type="text" id="loginNome" placeholder="Seu nome"></div>
        <div class="input-group"><label>CPF (apenas números)</label><input type="text" id="loginCPF" placeholder="00000000000" maxlength="11"></div>
        <div class="input-group"><label>Senha (admin)</label><input type="password" id="loginSenha" placeholder="Senha do administrador"></div>
        <button class="btn btn-primary" id="btnLogin">🔓 ENTRAR</button>
    </div>
</div>

<!-- SISTEMA PRINCIPAL -->
<div id="mainScreen" class="hidden">
    <div class="container">
        <div class="header">
            <h1>💰 Meu Financeiro</h1>
            <button class="theme-toggle" id="btnTheme">🌙 Modo Escuro</button>
        </div>

        <div class="user-bar">
            <div><strong id="displayNome"></strong> <span id="badgeAdmin" class="badge badge-admin hidden">ADMIN</span></div>
            <button class="btn-logout" id="btnLogout">🚪 Sair</button>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <!-- ADMIN -->
        <div id="adminSection" class="admin-section hidden">
            <div class="admin-nav">
                <button class="active" data-panel="despesa">➕ Despesa</button>
                <button data-panel="receita">💰 Receita</button>
                <button data-panel="investimento">📈 Investimento</button>
                <button data-panel="meta">🎯 Meta</button>
                <button data-panel="cartao">💳 Cartão</button>
                <button data-panel="backup">💾 Backup</button>
            </div>

            <div id="panel-despesa" class="form-panel active">
                <h3>➕ Nova Despesa</h3>
                <div class="form-row">
                    <div class="form-group"><label>Valor R$</label><input type="number" id="despValor" step="0.01"></div>
                    <div class="form-group"><label>Categoria</label><select id="despCategoria"></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Descrição</label><input type="text" id="despDescricao" placeholder="Ex: Supermercado"></div>
                    <div class="form-group"><label>Data</label><input type="date" id="despData"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Cartão</label><select id="despCartao"><option value="">Sem cartão (à vista)</option></select></div>
                    <div class="form-group"><label>Parcelas</label><input type="number" id="despParcelas" value="1" min="1" max="48"></div>
                </div>
                <button class="btn btn-success" id="btnSalvarDespesa">✅ SALVAR</button>
            </div>

            <div id="panel-receita" class="form-panel">
                <h3>💰 Nova Receita</h3>
                <div class="form-row">
                    <div class="form-group"><label>Valor R$</label><input type="number" id="recValor" step="0.01"></div>
                    <div class="form-group"><label>Categoria</label><select id="recCategoria"></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Descrição</label><input type="text" id="recDescricao" placeholder="Ex: Salário"></div>
                    <div class="form-group"><label>Data</label><input type="date" id="recData"></div>
                </div>
                <button class="btn btn-success" id="btnSalvarReceita">✅ SALVAR</button>
            </div>

            <div id="panel-investimento" class="form-panel">
                <h3>📈 Novo Investimento</h3>
                <div class="form-row">
                    <div class="form-group"><label>Valor R$</label><input type="number" id="invValor" step="0.01"></div>
                    <div class="form-group"><label>Tipo</label><select id="invTipo"></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Corretora</label><input type="text" id="invCorretora" placeholder="Ex: Nubank, XP"></div>
                    <div class="form-group"><label>Data</label><input type="date" id="invData"></div>
                </div>
                <button class="btn btn-success" id="btnSalvarInvestimento">✅ SALVAR</button>
            </div>

            <div id="panel-meta" class="form-panel">
                <h3>🎯 Nova Meta</h3>
                <div class="form-row">
                    <div class="form-group"><label>Nome</label><input type="text" id="metaNome" placeholder="Ex: Comprar Carro"></div>
                    <div class="form-group"><label>Valor Alvo R$</label><input type="number" id="metaAlvo" step="0.01"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Valor Atual R$</label><input type="number" id="metaAtual" step="0.01" value="0"></div>
                    <div class="form-group"><label>Data Limite</label><input type="date" id="metaData"></div>
                </div>
                <button class="btn btn-success" id="btnSalvarMeta">✅ SALVAR</button>
            </div>

            <div id="panel-cartao" class="form-panel">
                <h3>💳 Cadastrar Cartão</h3>
                <div class="form-row">
                    <div class="form-group"><label>Nome do Cartão</label><input type="text" id="cartaoNome" placeholder="Ex: Nubank, Santander"></div>
                    <div class="form-group"><label>Dia Vencimento</label><input type="number" id="cartaoVencimento" min="1" max="31" placeholder="10"></div>
                </div>
                <button class="btn btn-success" id="btnSalvarCartao">✅ SALVAR</button>
                <hr style="margin:20px 0;border-color:var(--border);">
                <h4>Cartões Cadastrados</h4>
                <div id="listaCartoes" style="margin-top:10px;"></div>
            </div>

            <div id="panel-backup" class="form-panel">
                <h3>💾 Backup e Restauração</h3>
                <button class="btn btn-primary" id="btnExportJSON" style="width:auto;">📥 Exportar Backup (JSON)</button>
                <button class="btn btn-warning" id="btnImportar" style="width:auto; margin-left:10px;">📂 Restaurar Backup</button>
                <input type="file" id="importFile" accept=".json" style="display:none;">
            </div>
        </div>

        <!-- FILTROS E ABAS -->
        <div class="controls">
            <span>📅</span><input type="month" id="filtroMes">
            <span>🔍</span><input type="text" id="filtroTexto" placeholder="Buscar descrição...">
            <button class="btn-sm btn-primary" id="btnFiltrar" style="background:#4a6cf7;color:white;">Filtrar</button>
            <button class="btn-sm btn-primary" id="btnLimparFiltros" style="background:var(--border);color:var(--text);">Limpar</button>
        </div>

        <div class="tabs-and-view">
            <div class="tabs">
                <button class="tab active" data-tab="todos">📋 Todos</button>
                <button class="tab" data-tab="despesas">📉 Despesas</button>
                <button class="tab" data-tab="receitas">💵 Receitas</button>
                <button class="tab" data-tab="investimentos">📈 Investimentos</button>
                <button class="tab" data-tab="metas">🎯 Metas</button>
                <button class="tab" data-tab="grafico">📊 Gráfico</button>
            </div>
            <div class="view-toggle">
                <button class="view-btn active" data-view="cards">🃏</button>
                <button class="view-btn" data-view="tabela">📋</button>
            </div>
        </div>

        <div id="conteudoContainer"></div>
        <div id="tabelaContainer" class="hidden"><div class="table-container"><table><thead id="tabelaHead"></thead><tbody id="tabelaBody"></tbody></table></div></div>
        <canvas id="graficoCanvas" class="hidden" style="max-height:400px;"></canvas>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://wzrsxzhdfmbccicluytb.supabase.co';
const SUPABASE_KEY = 'sb_publishable__OGAIY97ObenG-digw9E1Q_4SkuMJkF';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let usuarioLogado = null, isAdmin = false, tabAtual = 'todos', viewAtual = 'cards', paginaAtual = 1;
const ITENS_POR_PAGINA = 8;
let despesas = [], receitas = [], investimentos = [], metas = [], cartoes = [];
let chartInstance = null;

function showLoading(m='Carregando...'){document.getElementById('loadingOverlay').classList.add('show');document.querySelector('.loading-text').textContent=m;}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show');}
function validarCPF(cpf){cpf=cpf.replace(/\D/g,'');if(cpf.length!==11||/^(\d)\1{10}$/.test(cpf))return false;let soma=0;for(let i=0;i<9;i++)soma+=parseInt(cpf[i])*(10-i);let resto=(soma*10)%11;if(resto===10)resto=0;if(resto!==parseInt(cpf[9]))return false;soma=0;for(let i=0;i<10;i++)soma+=parseInt(cpf[i])*(11-i);resto=(soma*10)%11;if(resto===10)resto=0;return resto===parseInt(cpf[10]);}
function formatarCPF(cpf){cpf=cpf.replace(/\D/g,'');return cpf.length===11?cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4'):cpf;}
function formatarData(data){if(!data)return'—';const d=new Date(data.split('T')[0]);return d.toLocaleDateString('pt-BR');}

async function carregarTudo(){
    showLoading();
    const [d,r,i,m,c] = await Promise.all([
        supabase.from('despesas').select('*').eq('admin_id', usuarioLogado.id).order('data',{ascending:false}),
        supabase.from('receitas').select('*').eq('admin_id', usuarioLogado.id).order('data',{ascending:false}),
        supabase.from('investimentos').select('*').eq('admin_id', usuarioLogado.id).order('data',{ascending:false}),
        supabase.from('metas').select('*').eq('admin_id', usuarioLogado.id),
        supabase.from('cartoes').select('*').eq('admin_id', usuarioLogado.id)
    ]);
    despesas=d.data||[]; receitas=r.data||[]; investimentos=i.data||[]; metas=m.data||[]; cartoes=c.data||[];
    hideLoading();
    atualizarDashboard();
}

function atualizarDashboard(){
    const totalDesp=despesas.reduce((s,i)=>s+parseFloat(i.valor),0);
    const totalRec=receitas.reduce((s,i)=>s+parseFloat(i.valor),0);
    const totalInv=investimentos.reduce((s,i)=>s+parseFloat(i.valor),0);
    document.getElementById('statsGrid').innerHTML=`
        <div class="stat-card" style="border-left-color:${totalRec-totalDesp>=0?'#10b981':'#ef4444'};"><div class="stat-label">💰 Saldo</div><div class="stat-value" style="color:${totalRec-totalDesp>=0?'#10b981':'#ef4444'};">R$ ${(totalRec-totalDesp).toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">💵 Receitas</div><div class="stat-value">R$ ${totalRec.toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">📉 Despesas</div><div class="stat-value">R$ ${totalDesp.toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">📈 Investido</div><div class="stat-value">R$ ${totalInv.toFixed(2)}</div></div>
    `;
    popularSelects();
    renderizarConteudo();
}

function popularSelects(){
    const cats=['🍔 Alimentação','🚗 Transporte','🏠 Moradia','🏥 Saúde','🎮 Lazer','📚 Educação','👕 Vestuário','💡 Outros'];
    document.getElementById('despCategoria').innerHTML=cats.map((c,i)=>`<option value="${i+1}">${c}</option>`).join('');
    document.getElementById('recCategoria').innerHTML=['💼 Salário','🎨 Freelance','📊 Rendimentos','💰 Outros'].map((c,i)=>`<option value="${i+1}">${c}</option>`).join('');
    document.getElementById('invTipo').innerHTML=['📊 Renda Fixa','📈 Ações','🏦 Fundos','🪙 Cripto','🏠 Imóveis'].map((c,i)=>`<option value="${i+1}">${c}</option>`).join('');
    document.getElementById('despCartao').innerHTML='<option value="">Sem cartão (à vista)</option>'+cartoes.map(c=>`<option value="${c.id}">💳 ${c.nome} (vence dia ${c.vencimento})</option>`).join('');
    document.getElementById('listaCartoes').innerHTML=cartoes.map(c=>`<div style="padding:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;">💳 ${c.nome} - Vence dia ${c.vencimento} <button onclick="excluirCartao(${c.id})" style="background:#ef4444;color:white;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;">🗑️</button></div>`).join('')||'Nenhum cartão cadastrado.';
}

function getDadosFiltrados(){
    const mesFiltro=document.getElementById('filtroMes').value;
    const texto=document.getElementById('filtroTexto').value.toLowerCase();
    let dados=[];
    if(tabAtual==='todos'){
        dados=[...despesas.map(d=>({...d,tipo:'despesa',cor:'#ef4444',sinal:'-'})),...receitas.map(r=>({...r,tipo:'receita',cor:'#10b981',sinal:'+'})),...investimentos.map(i=>({...i,tipo:'investimento',cor:'#8b5cf6',sinal:'📈'}))];
    }else if(tabAtual==='despesas')dados=despesas.map(d=>({...d,tipo:'despesa',cor:'#ef4444',sinal:'-'}));
    else if(tabAtual==='receitas')dados=receitas.map(r=>({...r,tipo:'receita',cor:'#10b981',sinal:'+'}));
    else if(tabAtual==='investimentos')dados=investimentos.map(i=>({...i,tipo:'investimento',cor:'#8b5cf6',sinal:'📈'}));
    else if(tabAtual==='metas')return metas;
    
    if(mesFiltro)dados=dados.filter(d=>d.data&&d.data.startsWith(mesFiltro));
    if(texto)dados=dados.filter(d=>d.descricao&&d.descricao.toLowerCase().includes(texto));
    dados.sort((a,b)=>new Date(b.data)-new Date(a.data));
    return dados;
}

function renderizarConteudo(){
    const container=document.getElementById('conteudoContainer');
    const graficoCanvas=document.getElementById('graficoCanvas');
    const tabelaContainer=document.getElementById('tabelaContainer');
    graficoCanvas.classList.add('hidden'); tabelaContainer.classList.add('hidden');
    if(chartInstance){chartInstance.destroy();chartInstance=null;}
    
    if(tabAtual==='grafico'){
        container.innerHTML=''; graficoCanvas.classList.remove('hidden');
        const ctx=graficoCanvas.getContext('2d');
        const porCat={}; despesas.forEach(d=>{const cat=['🍔 Alimentação','🚗 Transporte','🏠 Moradia','🏥 Saúde','🎮 Lazer','📚 Educação','👕 Vestuário','💡 Outros'][d.categoria_id-1]||'Outros';porCat[cat]=(porCat[cat]||0)+parseFloat(d.valor);});
        if(Object.keys(porCat).length>0)chartInstance=new Chart(ctx,{type:'pie',data:{labels:Object.keys(porCat),datasets:[{data:Object.values(porCat),backgroundColor:['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#84cc16']}]}});
        else container.innerHTML='<p style="text-align:center;padding:40px;">Nenhum dado.</p>';
        document.getElementById('pagination').innerHTML='';
        return;
    }
    
    const dados=getDadosFiltrados();
    if(tabAtual==='metas'){
        container.classList.remove('hidden'); tabelaContainer.classList.add('hidden');
        container.innerHTML=dados.length===0?'<p style="text-align:center;padding:40px;">Nenhuma meta.</p>':'<div class="card-grid">'+dados.map(m=>{const pct=Math.min((m.valor_atual/m.valor_alvo)*100,100);return`<div class="item-card"><div class="item-card-header"><span class="item-card-title">🎯 ${m.nome}</span><span>${pct.toFixed(0)}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><p>💰 R$ ${parseFloat(m.valor_atual).toFixed(2)} / R$ ${parseFloat(m.valor_alvo).toFixed(2)}</p>${m.data_limite?`<p>📅 Até ${formatarData(m.data_limite)}</p>`:''}</div>`}).join('')+'</div>';
        document.getElementById('pagination').innerHTML='';
        return;
    }
    
    const totalPag=Math.ceil(dados.length/ITENS_POR_PAGINA)||1;
    if(paginaAtual>totalPag)paginaAtual=totalPag;
    const inicio=(paginaAtual-1)*ITENS_POR_PAGINA;
    const paginados=dados.slice(inicio,inicio+ITENS_POR_PAGINA);
    
    if(viewAtual==='cards'){
        container.classList.remove('hidden'); tabelaContainer.classList.add('hidden');
        container.innerHTML=paginados.length===0?'<p style="text-align:center;padding:40px;">Nenhum registro.</p>':'<div class="card-grid">'+paginados.map(d=>`<div class="item-card" style="border-left-color:${d.cor||'#4a6cf7'};"><div class="item-card-header"><span class="item-card-title">${d.sinal||''} ${d.descricao||'Sem descrição'}</span><span style="color:${d.cor};font-weight:700;">R$ ${parseFloat(d.valor).toFixed(2)}</span></div><p style="color:var(--text-light);font-size:0.85rem;">📅 ${formatarData(d.data)} ${d.corretora?'| 🏦 '+d.corretora:''} ${d.parcelas?'| 📊 '+d.parcelas+'x':''}</p></div>`).join('')+'</div>';
    }else{
        container.classList.add('hidden'); tabelaContainer.classList.remove('hidden');
        document.getElementById('tabelaHead').innerHTML='<tr><th>Tipo</th><th>Descrição</th><th>Valor</th><th>Data</th><th>Detalhes</th></tr>';
        document.getElementById('tabelaBody').innerHTML=paginados.map(d=>`<tr><td>${d.sinal||''} ${d.tipo}</td><td>${d.descricao||'—'}</td><td style="color:${d.cor};">R$ ${parseFloat(d.valor).toFixed(2)}</td><td>${formatarData(d.data)}</td><td>${d.corretora||''} ${d.parcelas?d.parcelas+'x':''}</td></tr>`).join('');
    }
    
    let pagHTML='';
    for(let i=1;i<=totalPag;i++)pagHTML+=`<button onclick="mudarPagina(${i})" class="${i===paginaAtual?'active':''}">${i}</button>`;
    document.getElementById('pagination').innerHTML=pagHTML;
}
function mudarPagina(p){paginaAtual=p;renderizarConteudo();window.scrollTo({top:0,behavior:'smooth'});}

// AÇÕES
async function salvarDespesa(){
    const valor=parseFloat(document.getElementById('despValor').value);
    if(!valor||valor<=0)return alert('Valor inválido!');
    await supabase.from('despesas').insert([{admin_id:usuarioLogado.id,categoria_id:parseInt(document.getElementById('despCategoria').value),valor,descricao:document.getElementById('despDescricao').value,data:document.getElementById('despData').value||new Date().toISOString().split('T')[0],cartao_id:document.getElementById('despCartao').value||null,parcelas:parseInt(document.getElementById('despParcelas').value)||1}]);
    document.getElementById('panel-despesa').querySelectorAll('input').forEach(i=>i.value='');
    carregarTudo();
}
async function salvarReceita(){
    const valor=parseFloat(document.getElementById('recValor').value);
    if(!valor||valor<=0)return alert('Valor inválido!');
    await supabase.from('receitas').insert([{admin_id:usuarioLogado.id,categoria_id:parseInt(document.getElementById('recCategoria').value),valor,descricao:document.getElementById('recDescricao').value,data:document.getElementById('recData').value||new Date().toISOString().split('T')[0]}]);
    document.getElementById('panel-receita').querySelectorAll('input').forEach(i=>i.value='');
    carregarTudo();
}
async function salvarInvestimento(){
    const valor=parseFloat(document.getElementById('invValor').value);
    if(!valor||valor<=0)return alert('Valor inválido!');
    await supabase.from('investimentos').insert([{admin_id:usuarioLogado.id,categoria_id:parseInt(document.getElementById('invTipo').value),valor,corretora:document.getElementById('invCorretora').value,data:document.getElementById('invData').value||new Date().toISOString().split('T')[0]}]);
    document.getElementById('panel-investimento').querySelectorAll('input').forEach(i=>i.value='');
    carregarTudo();
}
async function salvarMeta(){
    const nome=document.getElementById('metaNome').value.trim();
    const alvo=parseFloat(document.getElementById('metaAlvo').value);
    if(!nome||!alvo)return alert('Preencha nome e valor alvo!');
    await supabase.from('metas').insert([{admin_id:usuarioLogado.id,nome,valor_alvo:alvo,valor_atual:parseFloat(document.getElementById('metaAtual').value)||0,data_limite:document.getElementById('metaData').value||null}]);
    document.getElementById('panel-meta').querySelectorAll('input').forEach(i=>i.value='');
    carregarTudo();
}
async function salvarCartao(){
    const nome=document.getElementById('cartaoNome').value.trim();
    const venc=parseInt(document.getElementById('cartaoVencimento').value);
    if(!nome||!venc||venc<1||venc>31)return alert('Preencha corretamente!');
    await supabase.from('cartoes').insert([{admin_id:usuarioLogado.id,nome,vencimento:venc}]);
    document.getElementById('cartaoNome').value=''; document.getElementById('cartaoVencimento').value='';
    carregarTudo();
}
async function excluirCartao(id){if(confirm('Excluir cartão?')){await supabase.from('cartoes').delete().eq('id',id);carregarTudo();}}
function exportarJSON(){
    const backup={despesas,receitas,investimentos,metas,cartoes};
    const blob=new Blob([JSON.stringify(backup)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup_financeiro.json';a.click();
}
async function importarJSON(file){
    try{const text=await file.text();const dados=JSON.parse(text);showLoading('Importando...');
    for(const t of['despesas','receitas','investimentos','metas','cartoes']){if(dados[t])for(const item of dados[t]){item.admin_id=usuarioLogado.id;await supabase.from(t).insert([item]);}}
    hideLoading();alert('✅ Importado!');carregarTudo();}catch(e){hideLoading();alert('❌ Erro!');}
}

// EVENTOS
document.addEventListener('DOMContentLoaded',()=>{
    if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.getElementById('btnTheme').textContent='☀️ Modo Claro';}
    document.getElementById('btnTheme').addEventListener('click',()=>{document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');document.getElementById('btnTheme').textContent=d?'☀️ Modo Claro':'🌙 Modo Escuro';localStorage.setItem('theme',d?'dark':'light');});
    
    document.getElementById('btnLogin').addEventListener('click',async()=>{
        const nome=document.getElementById('loginNome').value.trim();
        const cpf=document.getElementById('loginCPF').value.trim();
        const senha=document.getElementById('loginSenha').value.trim();
        if(!nome||!validarCPF(cpf))return alert('Preencha corretamente!');
        if(cpf==='12345678909'&&senha==='admin'){usuarioLogado={id:1,nome,cpf};isAdmin=true;}
        else{const{data}=await supabase.from('usuarios').select('*').eq('cpf',cpf);if(data&&data.length>0){usuarioLogado=data[0];isAdmin=usuarioLogado.tipo==='admin';}else{const{data:novo}=await supabase.from('usuarios').insert([{nome,cpf,tipo:'comum'}]).select();usuarioLogado=novo[0];isAdmin=false;}}
        document.getElementById('loginScreen').classList.add('hidden');document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('displayNome').textContent=`${usuarioLogado.nome} (${formatarCPF(usuarioLogado.cpf)})`;
        if(isAdmin){document.getElementById('badgeAdmin').classList.remove('hidden');document.getElementById('adminSection').classList.remove('hidden');}
        carregarTudo();
    });
    
    document.getElementById('btnLogout').addEventListener('click',()=>{if(confirm('Sair?')){usuarioLogado=null;document.getElementById('mainScreen').classList.add('hidden');document.getElementById('loginScreen').classList.remove('hidden');}});
    
    document.querySelectorAll('.admin-nav button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.admin-nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.form-panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+b.dataset.panel).classList.add('active');}));
    
    document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');tabAtual=t.dataset.tab;paginaAtual=1;renderizarConteudo();}));
    
    document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.view-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');viewAtual=b.dataset.view;renderizarConteudo();}));
    
    document.getElementById('btnSalvarDespesa').addEventListener('click',salvarDespesa);
    document.getElementById('btnSalvarReceita').addEventListener('click',salvarReceita);
    document.getElementById('btnSalvarInvestimento').addEventListener('click',salvarInvestimento);
    document.getElementById('btnSalvarMeta').addEventListener('click',salvarMeta);
    document.getElementById('btnSalvarCartao').addEventListener('click',salvarCartao);
    document.getElementById('btnExportJSON').addEventListener('click',exportarJSON);
    document.getElementById('btnImportar').addEventListener('click',()=>document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change',function(e){if(e.target.files[0]&&confirm('Importar?'))importarJSON(e.target.files[0]);});
    document.getElementById('btnFiltrar').addEventListener('click',()=>{paginaAtual=1;renderizarConteudo();});
    document.getElementById('btnLimparFiltros').addEventListener('click',()=>{document.getElementById('filtroMes').value='';document.getElementById('filtroTexto').value='';paginaAtual=1;renderizarConteudo();});
});
</script>
