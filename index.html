<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Controle Financeiro - Minhas Contas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1a202c;
            --text-light: #718096;
            --border: #e2e8f0;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.1);
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradient-danger: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            --radius: 16px;
            --radius-sm: 10px;
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 20px rgba(0,0,0,0.2);
            --gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s ease;
            line-height: 1.6;
        }
        
        /* LOGIN SCREEN */
        .login-screen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--gradient);
            position: relative;
            overflow: hidden;
        }
        .login-screen::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }
        .login-screen::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            bottom: -50px;
            left: -50px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-card .logo .icon {
            font-size: 3rem;
            display: block;
        }
        .login-card h1 {
            text-align: center;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            margin-bottom: 4px;
        }
        .login-card .subtitle {
            text-align: center;
            color: #718096;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8fafc;
        }
        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
            background: white;
            box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
        
        /* CONTAINER */
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .theme-toggle:hover { transform: scale(1.05); }
        
        /* USER BAR */
        .user-bar {
            background: var(--card);
            padding: 16px 24px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            gap: 12px;
        }
        .user-info { display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-admin { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-logout:hover { background: #dc2626; }
        
        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .stat-card .stat-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .stat-change {
            font-size: 0.75rem;
            color: #10b981;
            font-weight: 600;
            margin-top: 4px;
        }
        
        /* BIG ADD BUTTON */
        .big-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 28px;
            padding: 18px 30px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(99,102,241,0.3);
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .big-add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(99,102,241,0.5);
        }
        .big-add-btn .btn-icon {
            font-size: 1.5rem;
        }
        
        /* TABS */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: var(--card);
            padding: 6px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .tab {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-light);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            text-align: center;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }
        .tab:hover:not(.active) {
            background: var(--bg);
            color: var(--text);
        }
        
        /* CARDS GRID */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .gasto-card {
            background: var(--card);
            padding: 20px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-left: 5px solid #6366f1;
            transition: all 0.3s;
            position: relative;
        }
        .gasto-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .gasto-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .gasto-card-title {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .gasto-card-valor {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ef4444;
        }
        .gasto-card-desc {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .gasto-card-meta {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
            color: var(--text-light);
            flex-wrap: wrap;
        }
        .gasto-card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .gasto-card-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-recorrente {
            background: #fef3c7;
            color: #92400e;
        }
        
        /* MODAL PREMIUM */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--card);
            padding: 35px;
            border-radius: var(--radius);
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            font-size: 1.3rem;
            margin-bottom: 24px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .modal-actions button { width: auto; padding: 12px 24px; }
        .btn-success { background: var(--gradient-success); color: white; }
        .btn-warning { background: #f59e0b; color: #000; }
        
        /* PAGINATION */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--card);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            min-width: 40px;
        }
        .pagination button.active {
            background: var(--gradient);
            color: white;
            border-color: transparent;
        }
        .pagination button:hover:not(.active):not(:disabled) {
            border-color: #6366f1;
            color: #6366f1;
        }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* LOADING */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 16px;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: white; font-weight: 600; font-size: 0.9rem; }
        
        /* SECTION HEADER */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        .hidden { display: none !important; }
        
        /* CHART CONTAINER */
        .chart-container {
            background: var(--card);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }
        .chart-container canvas { max-height: 350px; }
        
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .card-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .tab { font-size: 0.7rem; padding: 10px 8px; }
            .stat-card { padding: 16px; }
            .stat-card .stat-value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">

</div>

<!-- ============ LOGIN ============ -->

    <script>
// ============================================
// CONFIGURAÇÃO SUPABASE
// ============================================
const SUPABASE_URL = 'https://wzrsxzhdfmbccicluytb.supabase.co';
const SUPABASE_KEY = 'sb_publishable__OGAIY97ObenG-digw9E1Q_4SkuMJkF';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
console.log('✅ Supabase conectado!');

// ============================================
// ESTADO GLOBAL
// ============================================
let usuarioLogado = null;
let isAdmin = false;
let tabAtual = 'todos';
let paginaAtual = 1;
const ITENS_POR_PAGINA = 6;
let todosGastos = [];
let categoriasCache = [];
let cartoesCache = [];
let usuariosCache = [];
let chartInstance = null;

// ============================================
// FUNÇÕES BÁSICAS
// ============================================
function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
    let soma = 0;
    for (let i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
    let resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;
    if (resto !== parseInt(cpf[9])) return false;
    soma = 0;
    for (let i = 0; i < 10; i++) soma += parseInt(cpf[i]) * (11 - i);
    resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;
    return resto === parseInt(cpf[10]);
}

function formatarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    return cpf.length === 11 ? cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4') : cpf;
}

function formatarData(data) {
    if (!data) return '—';
    const d = new Date(data.split('T')[0]);
    return d.toLocaleDateString('pt-BR');
}

function showLoading(msg = 'Carregando...') {
    document.getElementById('loadingOverlay').classList.add('show');
    document.querySelector('.loading-text').textContent = msg;
}
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

// ============================================
// BANCO DE DADOS
// ============================================
async function buscarCategorias() {
    const { data } = await supabase.from('categorias').select('*').order('nome');
    categoriasCache = data || [];
    return categoriasCache;
}

async function buscarCartoes() {
    if (!usuarioLogado) return [];
    const { data } = await supabase.from('cartoes').select('*').eq('admin_id', usuarioLogado.id).order('nome_cartao');
    cartoesCache = data || [];
    return cartoesCache;
}

async function buscarUsuarios() {
    if (!usuarioLogado) return [];
    const { data } = await supabase.from('usuarios').select('*');
    usuariosCache = data || [];
    return usuariosCache;
}

async function buscarGastos() {
    if (!usuarioLogado) return [];
    let query = supabase.from('gastos').select('*').eq('admin_id', usuarioLogado.id).order('data_compra', { ascending: false });
    const { data } = await query;
    todosGastos = data || [];
    return todosGastos;
}

async function inserirGasto(gasto) {
    const { data, error } = await supabase.from('gastos').insert([gasto]).select();
    if (error) throw error;
    return data[0];
}

async function deletarGasto(id) {
    const { error } = await supabase.from('gastos').delete().eq('id', id);
    if (error) throw error;
}

async function atualizarGasto(id, updates) {
    const { error } = await supabase.from('gastos').update(updates).eq('id', id);
    if (error) throw error;
}
// ============================================
// RENDERIZAÇÃO
// ============================================
async function atualizarInterface() {
    showLoading('Atualizando...');
    await Promise.all([buscarCategorias(), buscarCartoes(), buscarUsuarios(), buscarGastos()]);
    atualizarStats();
    renderizarAbas();
    hideLoading();
}

function atualizarStats() {
    const gastosAtivos = todosGastos.filter(g => g.status === 'ativo');
    const totalGastos = gastosAtivos.reduce((s, g) => s + parseFloat(g.valor_total), 0);
    const gastosRecorrentes = todosGastos.filter(g => g.recorrente === true);
    const totalFixo = gastosRecorrentes.reduce((s, g) => s + parseFloat(g.valor_total), 0);

    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card" style="border-left: 5px solid #ef4444;">
            <div class="stat-icon">💸</div>
            <div class="stat-label">Total em Gastos</div>
            <div class="stat-value" style="background: linear-gradient(135deg, #ef4444, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">R$ ${totalGastos.toFixed(2)}</div>
            <div class="stat-change">${gastosAtivos.length} compras ativas</div>
        </div>
        <div class="stat-card" style="border-left: 5px solid #f59e0b;">
            <div class="stat-icon">💰</div>
            <div class="stat-label">Contas Fixas</div>
            <div class="stat-value" style="background: linear-gradient(135deg, #f59e0b, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">R$ ${totalFixo.toFixed(2)}</div>
            <div class="stat-change">${gastosRecorrentes.length} contas recorrentes</div>
        </div>
        <div class="stat-card" style="border-left: 5px solid #6366f1;">
            <div class="stat-icon">💳</div>
            <div class="stat-label">Cartões</div>
            <div class="stat-value">${cartoesCache.length}</div>
            <div class="stat-change">cadastrados</div>
        </div>
        <div class="stat-card" style="border-left: 5px solid #10b981;">
            <div class="stat-icon">👥</div>
            <div class="stat-label">Pessoas</div>
            <div class="stat-value">${usuariosCache.length}</div>
            <div class="stat-change">na família</div>
        </div>
    `;
}

function getGastosFiltrados() {
    let dados = [...todosGastos];

    switch(tabAtual) {
        case 'cartoes':
            dados = dados.filter(g => g.cartao_id !== null);
            break;
        case 'contas':
            dados = dados.filter(g => g.recorrente === true);
            break;
        case 'renda':
            dados = []; // Será implementado com tabela de renda
            break;
        case 'investir':
            dados = []; // Será implementado com tabela de investimentos
            break;
        case 'metas':
            dados = []; // Será implementado com tabela de metas
            break;
        case 'graficos':
            document.getElementById('graficoContainer').classList.remove('hidden');
            setTimeout(() => renderizarGrafico(todosGastos), 100);
            return [];
        default:
            break;
    }

    document.getElementById('graficoContainer').classList.add('hidden');
    return dados;
}

function getPaginaDados(dados) {
    const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
    return dados.slice(inicio, inicio + ITENS_POR_PAGINA);
}

function renderizarAbas() {
    const container = document.getElementById('tabContent');
    const dadosFiltrados = getGastosFiltrados();

    if (tabAtual === 'graficos') return;

    const totalPag = Math.ceil(dadosFiltrados.length / ITENS_POR_PAGINA);
    if (paginaAtual > totalPag && totalPag > 0) paginaAtual = totalPag;
    const dadosPaginados = getPaginaDados(dadosFiltrados);

    if (dadosFiltrados.length === 0) {
        const mensagens = {
            'cartoes': 'Nenhum gasto com cartão. Cadastre um gasto associado a um cartão!',
            'contas': 'Nenhuma conta fixa. Cadastre um gasto como "Conta Fixa"!',
            'renda': 'Módulo de Renda em breve!',
            'investir': 'Módulo de Investimentos em breve!',
            'metas': 'Módulo de Metas em breve!',
            'todos': 'Nenhum gasto encontrado. Clique em <strong>➕ NOVO GASTO</strong>!'
        };
        container.innerHTML = `<p style="text-align:center;padding:40px;color:var(--text-light);font-size:1.1rem;">${mensagens[tabAtual] || mensagens['todos']}</p>`;
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    container.innerHTML = `<div class="card-grid">${dadosPaginados.map(g => {
        const cat = categoriasCache.find(c => c.id === g.categoria_id);
        const cart = cartoesCache.find(c => c.id === g.cartao_id);
        const user = usuariosCache.find(u => u.id === g.usuario_id);
        const quitado = g.status === 'quitado';

        return `
            <div class="gasto-card" style="border-left-color: ${cart ? cart.cor : '#6366f1'}; opacity: ${quitado ? '0.6' : '1'};">
                ${g.recorrente ? '<span class="gasto-card-badge badge-recorrente">🔄 Fixo</span>' : ''}
                <div class="gasto-card-header">
                    <span class="gasto-card-title">${cat ? cat.icone + ' ' + cat.nome : '📦 Outros'}</span>
                    <span class="gasto-card-valor" style="color: ${quitado ? '#10b981' : '#ef4444'};">R$ ${parseFloat(g.valor_total).toFixed(2)}</span>
                </div>
                ${g.descricao ? `<p class="gasto-card-desc">📝 ${g.descricao}</p>` : ''}
                <div class="gasto-card-meta">
                    ${cart ? `<span>💳 ${cart.nome_cartao}</span>` : ''}
                    ${g.total_parcelas > 1 ? `<span>📊 ${g.parcela_atual}/${g.total_parcelas}</span>` : '<span>✅ À vista</span>'}
                    <span>📅 ${formatarData(g.data_compra)}</span>
                    ${user ? `<span>👤 ${user.nome}</span>` : ''}
                </div>
                ${isAdmin ? `<button onclick="excluirGasto(${g.id})" style="margin-top:10px;background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.75rem;">🗑️ Excluir</button>` : ''}
            </div>
        `;
    }).join('')}</div>`;

    // Paginação
    let pagHTML = '';
    if (totalPag > 1) {
        pagHTML += `<button onclick="mudarPagina(${paginaAtual - 1})" ${paginaAtual === 1 ? 'disabled' : ''}>⬅️</button>`;
        for (let i = 1; i <= totalPag; i++) {
            pagHTML += `<button onclick="mudarPagina(${i})" class="${i === paginaAtual ? 'active' : ''}">${i}</button>`;
        }
        pagHTML += `<button onclick="mudarPagina(${paginaAtual + 1})" ${paginaAtual === totalPag ? 'disabled' : ''}>➡️</button>`;
    }
    document.getElementById('pagination').innerHTML = pagHTML;
}

function mudarPagina(p) {
    const dadosFiltrados = getGastosFiltrados();
    const totalPag = Math.ceil(dadosFiltrados.length / ITENS_POR_PAGINA);
    if (p < 1 || p > totalPag) return;
    paginaAtual = p;
    renderizarAbas();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderizarGrafico(dados) {
    const ctx = document.getElementById('graficoPizza')?.getContext('2d');
    if (!ctx) return;
    if (chartInstance) chartInstance.destroy();

    const porCategoria = {};
    dados.filter(g => g.status === 'ativo').forEach(g => {
        const cat = categoriasCache.find(c => c.id === g.categoria_id);
        const nome = cat ? cat.icone + ' ' + cat.nome : '📦 Outros';
        porCategoria[nome] = (porCategoria[nome] || 0) + parseFloat(g.valor_total);
    });

    const labels = Object.keys(porCategoria);
    const valores = Object.values(porCategoria);
    const cores = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#84cc16', '#14b8a6'];

    chartInstance = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: valores,
                backgroundColor: cores.slice(0, labels.length),
                borderWidth: 3,
                borderColor: 'white'
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom', labels: { padding: 20, font: { size: 12 } } }
            }
        }
    });
}

// ============================================
// MODAL DE GASTO
// ============================================
function abrirModalGasto() {
    document.getElementById('modalGastoTitulo').textContent = '➕ Novo Gasto';
    document.getElementById('gastoValor').value = '';
    document.getElementById('gastoDescricao').value = '';
    document.getElementById('gastoParcelas').value = '1';
    document.getElementById('gastoData').value = new Date().toISOString().split('T')[0];
    document.getElementById('gastoRecorrente').value = 'false';
    document.getElementById('gastoVencimento').value = '';
    document.getElementById('grupoVencimento').style.display = 'none';

    const selCat = document.getElementById('gastoCategoria');
    selCat.innerHTML = '<option value="">Selecione...</option>' + 
        categoriasCache.filter(c => c.tipo === 'gasto').map(c => `<option value="${c.id}">${c.icone} ${c.nome}</option>`).join('');

    const selCart = document.getElementById('gastoCartao');
    selCart.innerHTML = '<option value="">Sem cartão</option>' + 
        cartoesCache.map(c => `<option value="${c.id}">💳 ${c.nome_cartao}</option>`).join('');

    const selUser = document.getElementById('gastoUsuario');
    selUser.innerHTML = '<option value="">Selecione...</option>' + 
        usuariosCache.map(u => `<option value="${u.id}">👤 ${u.nome} ${u.tipo === 'admin' ? '(Admin)' : ''}</option>`).join('');

    document.getElementById('modalGasto').classList.add('show');
}

document.getElementById('gastoRecorrente').addEventListener('change', function() {
    document.getElementById('grupoVencimento').style.display = this.value === 'true' ? 'block' : 'none';
});

document.getElementById('btnCancelarGasto').addEventListener('click', () => {
    document.getElementById('modalGasto').classList.remove('show');
});

document.getElementById('btnSalvarGasto').addEventListener('click', async () => {
    const valor = parseFloat(document.getElementById('gastoValor').value);
    const categoria_id = document.getElementById('gastoCategoria').value;

    if (!valor || valor <= 0) { alert('❌ Informe o valor!'); return; }
    if (!categoria_id) { alert('❌ Selecione a categoria!'); return; }

    const gasto = {
        admin_id: usuarioLogado.id,
        cartao_id: document.getElementById('gastoCartao').value || null,
        usuario_id: document.getElementById('gastoUsuario').value || usuarioLogado.id,
        categoria_id: parseInt(categoria_id),
        descricao: document.getElementById('gastoDescricao').value.trim(),
        valor_total: valor,
        total_parcelas: parseInt(document.getElementById('gastoParcelas').value) || 1,
        parcela_atual: 1,
        data_compra: document.getElementById('gastoData').value,
        recorrente: document.getElementById('gastoRecorrente').value === 'true',
        dia_vencimento: document.getElementById('gastoRecorrente').value === 'true' ? parseInt(document.getElementById('gastoVencimento').value) || null : null,
        status: 'ativo'
    };

    showLoading('Salvando...');
    try {
        await inserirGasto(gasto);
        document.getElementById('modalGasto').classList.remove('show');
        hideLoading();
        alert('✅ Gasto salvo com sucesso!');
        paginaAtual = 1;
        atualizarInterface();
    } catch(e) {
        hideLoading();
        alert('❌ Erro ao salvar!');
        console.error(e);
    }
});

// ============================================
// EXCLUIR GASTO (Admin)
// ============================================
async function excluirGasto(id) {
    if (!confirm('⚠️ Tem certeza que deseja excluir este gasto?')) return;
    showLoading('Excluindo...');
    try {
        await deletarGasto(id);
        hideLoading();
        alert('✅ Gasto excluído!');
        atualizarInterface();
    } catch(e) {
        hideLoading();
        alert('❌ Erro ao excluir!');
    }
}

// Tornar função global
window.excluirGasto = excluirGasto;

// ============================================
// LOGIN
// ============================================
document.getElementById('btnLogin').addEventListener('click', async () => {
    const nome = document.getElementById('loginNome').value.trim();
    const cpf = document.getElementById('loginCPF').value.trim();
    const senha = document.getElementById('loginSenha').value.trim();

    if (!nome) { alert('Digite seu nome!'); return; }
    if (!cpf || !validarCPF(cpf)) { alert('CPF inválido!'); return; }

    showLoading('Autenticando...');

    // Admin fixo: CPF 12345678909 + senha 'admin'
    if (cpf === '12345678909' && senha === 'admin') {
        const { data: existentes } = await supabase.from('usuarios').select('*').eq('cpf', cpf);
        if (!existentes || existentes.length === 0) {
            await supabase.from('usuarios').insert([{ nome: nome, cpf: cpf, tipo: 'admin', senha: 'admin' }]);
        }
        const { data: admins } = await supabase.from('usuarios').select('*').eq('cpf', cpf);
        usuarioLogado = admins[0];
        isAdmin = true;
    } else if (senha === 'admin' && cpf !== '12345678909') {
        // CPF diferente do admin mas com senha admin - verifica se é admin
        const { data: admins } = await supabase.from('usuarios').select('*').eq('cpf', cpf).eq('tipo', 'admin');
        if (admins && admins.length > 0) {
            usuarioLogado = admins[0];
            isAdmin = true;
        } else {
            hideLoading();
            alert('❌ Senha incorreta ou usuário não é admin!');
            return;
        }
    } else {
        // Usuário comum
        const { data: usuarios } = await supabase.from('usuarios').select('*').eq('cpf', cpf);
        if (usuarios && usuarios.length > 0) {
            usuarioLogado = usuarios[0];
            isAdmin = usuarioLogado.tipo === 'admin';
        } else {
            // Criar novo usuário comum
            const { data: novo } = await supabase.from('usuarios').insert([{ nome, cpf, tipo: 'comum' }]).select();
            usuarioLogado = novo[0];
            isAdmin = false;
        }
    }

    hideLoading();
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('displayNome').textContent = `${usuarioLogado.nome} (${formatarCPF(usuarioLogado.cpf)})`;
    
    if (isAdmin) {
        document.getElementById('badgeAdmin').classList.remove('hidden');
    } else {
        document.getElementById('badgeAdmin').classList.add('hidden');
    }

    atualizarInterface();
});

document.addEventListener('DOMContentLoaded', () => {
    // Tema
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('btnTheme').textContent = '☀️ Modo Claro';
    }

    document.getElementById('btnTheme').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('btnTheme').textContent = isDark ? '☀️ Modo Claro' : '🌙 Modo Escuro';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Logout
    document.getElementById('btnLogout').addEventListener('click', () => {
        if (confirm('Sair do sistema?')) {
            usuarioLogado = null;
            isAdmin = false;
            todosGastos = [];
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginSenha').value = '';
        }
    });

    // Botão Novo Gasto
    document.getElementById('btnNovoGasto').addEventListener('click', abrirModalGasto);

    // Abas
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            tabAtual = tab.dataset.tab;
            paginaAtual = 1;
            renderizarAbas();
        });
    });

    // Fechar modal ao clicar fora
    document.getElementById('modalGasto').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('show');
    });

    // Enter no login
    ['loginNome', 'loginCPF', 'loginSenha'].forEach(id => {
        document.getElementById(id)?.addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('btnLogin').click();
        });
    });

    console.log('✅ Controle Financeiro v1.0 Premium pronto!');
    console.log('👑 Admin: CPF 12345678909 / Senha: admin');
    console.log('👤 Usuário: qualquer CPF válido');
});
