<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Controle Financeiro - Minhas Contas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-light: #666;
            --border: #e1e5eb;
            --primary: #4a6cf7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            transition: all 0.3s ease;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* LOGIN */
        .login-screen {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        .login-card h1 { text-align: center; color: #4a6cf7; margin-bottom: 8px; font-size: 2rem; }
        .login-card p { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9rem; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: #333; }
        .input-group input { width: 100%; padding: 12px 15px; border: 2px solid #e1e5eb; border-radius: 10px; font-size: 1rem; transition: all 0.3s; background: #f8fafc; }
        .input-group input:focus { outline: none; border-color: #4a6cf7; background: white; box-shadow: 0 0 0 4px rgba(74,108,247,0.1); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-primary { background: #4a6cf7; color: white; }
        .btn-primary:hover { background: #3651d6; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: #000; margin-top: 8px; }
        
        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; flex-wrap: wrap; gap: 15px;
        }
        .header h1 {
            background: linear-gradient(135deg, #4a6cf7, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }
        .theme-toggle {
            background: var(--card); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            font-weight: 600; color: var(--text); box-shadow: var(--shadow);
        }
        .user-bar {
            background: var(--card); padding: 15px 25px; border-radius: 12px;
            margin-bottom: 24px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: var(--shadow); flex-wrap: wrap; gap: 15px;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .badge {
            padding: 6px 16px; border-radius: 50px; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-admin { background: #fef3c7; color: #92400e; }
        .badge-user { background: #e0e7ff; color: #4a6cf7; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        /* STATS */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card); padding: 20px; border-radius: 12px;
            box-shadow: var(--shadow); border-left: 4px solid #4a6cf7;
        }
        .stat-label { font-size: 0.7rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #4a6cf7; }
        
        /* TABS */
        .tabs {
            display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px; border: none; border-radius: 50px;
            background: var(--card); color: var(--text); font-weight: 600;
            cursor: pointer; box-shadow: var(--shadow); font-size: 0.85rem;
        }
        .tab.active { background: #4a6cf7; color: white; }
        
        /* BOTÃO NOVO GASTO */
        .big-add-btn {
            display: block; width: 100%; max-width: 300px; margin: 0 auto 20px;
            padding: 16px; background: #10b981; color: white; border: none;
            border-radius: 50px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 15px rgba(16,185,129,0.3);
            transition: all 0.3s;
        }
        .big-add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
        
        /* CARDS */
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .gasto-card {
            background: var(--card); padding: 20px; border-radius: 12px;
            box-shadow: var(--shadow); border-left: 4px solid #4a6cf7;
        }
        .gasto-card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
        }
        .gasto-card-title { font-weight: 700; font-size: 1rem; }
        .gasto-card-categoria { font-size: 0.8rem; color: var(--text-light); }
        .gasto-card-valor { font-size: 1.2rem; font-weight: 700; color: #ef4444; }
        .gasto-card-detalhes { font-size: 0.8rem; color: var(--text-light); margin-top: 8px; }
        
        /* MODAL */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); justify-content: center; align-items: center;
            z-index: 9999; padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--card); padding: 30px; border-radius: 16px;
            max-width: 500px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .modal-content h3 { margin-bottom: 20px; }
        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; color: var(--text-light); text-transform: uppercase; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg); color: var(--text); font-size: 0.95rem;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions button { width: auto; padding: 10px 20px; }
        
        /* ADMIN */
        .admin-section { margin-bottom: 24px; }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .admin-nav button {
            padding: 10px 20px; border: none; border-radius: 12px;
            background: var(--card); color: var(--text); font-weight: 600;
            cursor: pointer; box-shadow: var(--shadow); font-size: 0.85rem;
        }
        .admin-nav button.active { background: #4a6cf7; color: white; }
        .form-panel {
            background: var(--card); padding: 25px; border-radius: 12px;
            box-shadow: var(--shadow); display: none; animation: fadeIn 0.3s;
        }
        .form-panel.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* PAGINATION */
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 8px; padding: 20px; flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
            background: var(--card); color: var(--text); font-weight: 600;
            cursor: pointer; font-size: 0.85rem; min-width: 38px;
        }
        .pagination button.active { background: #4a6cf7; color: white; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center;
            z-index: 9999; flex-direction: column; gap: 20px;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: white; font-weight: 600; }
        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .card-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Carregando...</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>💰 Controle Financeiro</h1>
        <p>Sistema Familiar - v1.0</p>
        <div class="input-group">
            <label>Nome Completo</label>
            <input type="text" id="loginNome" placeholder="Seu nome" autocomplete="off">
        </div>
        <div class="input-group">
            <label>CPF (apenas números)</label>
            <input type="text" id="loginCPF" placeholder="00000000000" maxlength="11" autocomplete="off">
        </div>
        <div class="input-group">
            <label>Senha (admin)</label>
            <input type="password" id="loginSenha" placeholder="Senha do administrador">
        </div>
        <button class="btn btn-primary" id="btnLogin">🔓 ENTRAR</button>
        <div id="loginAlert" style="padding:12px;border-radius:8px;margin-top:12px;font-size:0.85rem;text-align:center;display:none;"></div>
    </div>
</div>

<!-- SISTEMA PRINCIPAL -->
<div id="mainScreen" class="hidden">
    <div class="container">
        <div class="header">
            <h1>💰 Controle Financeiro</h1>
            <button class="theme-toggle" id="btnTheme">🌙 Modo Escuro</button>
        </div>
        
        <div class="user-bar">
            <div class="user-info">
                <span>👤</span>
                <span id="displayNome" style="font-weight:600;"></span>
                <span id="badgeAdmin" class="badge badge-admin hidden">ADMIN</span>
            </div>
            <button class="btn-logout" id="btnLogout">🚪 Sair</button>
        </div>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <!-- BOTÃO ADICIONAR -->
        <button class="big-add-btn" id="btnNovoGasto">➕ NOVO GASTO</button>
        
        <!-- ABAS -->
        <div class="tabs">
            <button class="tab active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab" data-tab="cartoes">💳 Cartões</button>
            <button class="tab" data-tab="gastos">🛒 Gastos</button>
            <button class="tab" data-tab="contas">💰 Contas Fixas</button>
            <button class="tab" data-tab="renda">💵 Renda</button>
            <button class="tab" data-tab="investir">📈 Investir</button>
            <button class="tab" data-tab="graficos">📊 Gráficos</button>
        </div>
        
        <!-- CONTEÚDO DAS ABAS -->
        <div id="tabContent"></div>
        
        <!-- PAGINAÇÃO -->
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<!-- MODAL NOVO GASTO -->
<div class="modal" id="modalGasto">
    <div class="modal-content">
        <h3 id="modalGastoTitulo">➕ Novo Gasto</h3>
        <div class="form-group">
            <label>💰 Valor (R$) *</label>
            <input type="number" id="gastoValor" placeholder="0.00" step="0.01">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>📂 Categoria</label>
                <select id="gastoCategoria"></select>
            </div>
            <div class="form-group">
                <label>💳 Cartão</label>
                <select id="gastoCartao"><option value="">Sem cartão</option></select>
            </div>
        </div>
        <div class="form-group">
            <label>📝 Descrição (opcional)</label>
            <input type="text" id="gastoDescricao" placeholder="Ex: Açúcar, Gasolina...">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>👤 Quem gastou</label>
                <select id="gastoUsuario"></select>
            </div>
            <div class="form-group">
                <label>📊 Parcelas</label>
                <input type="number" id="gastoParcelas" value="1" min="1" max="48">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>📅 Data</label>
                <input type="date" id="gastoData">
            </div>
            <div class="form-group">
                <label>🔄 Recorrente</label>
                <select id="gastoRecorrente">
                    <option value="false">Não</option>
                    <option value="true">Sim (conta fixa)</option>
                </select>
            </div>
        </div>
        <div class="form-group" id="grupoVencimento" style="display:none;">
            <label>📅 Vencimento (dia)</label>
            <input type="number" id="gastoVencimento" placeholder="10" min="1" max="31">
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary" id="btnSalvarGasto" style="width:auto;">✅ SALVAR</button>
            <button class="btn btn-warning" id="btnCancelarGasto" style="width:auto;">CANCELAR</button>
        </div>
    </div>
</div>

<script>
// ============================================
// CONFIGURAÇÃO SUPABASE
// ============================================
const SUPABASE_URL = 'https://wzrsxzhdfmbccicluytb.supabase.co';
const SUPABASE_KEY = 'sb_publishable__OGAIY97ObenG-digw9E1Q_4SkuMJkF';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
console.log('✅ Supabase conectado!');

// ============================================
// ESTADO GLOBAL
// ============================================
let usuarioLogado = null;
let isAdmin = false;
let tabAtual = 'dashboard';
let paginaAtual = 1;
const ITENS_POR_PAGINA = 6;
let todosGastos = [];
let categoriasCache = [];
let cartoesCache = [];
let usuariosCache = [];

// ============================================
// FUNÇÕES BÁSICAS
// ============================================
function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
    let soma = 0;
    for (let i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
    let resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;
    if (resto !== parseInt(cpf[9])) return false;
    soma = 0;
    for (let i = 0; i < 10; i++) soma += parseInt(cpf[i]) * (11 - i);
    resto = (soma * 10) % 11;
    if (resto === 10) resto = 0;
    return resto === parseInt(cpf[10]);
}

function formatarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    return cpf.length === 11 ? cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4') : cpf;
}

function formatarData(data) {
    if (!data) return '—';
    const d = new Date(data.split('T')[0]);
    return d.toLocaleDateString('pt-BR');
}

function showLoading(msg = 'Carregando...') {
    document.getElementById('loadingOverlay').classList.add('show');
    document.querySelector('.loading-text').textContent = msg;
}
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

// ============================================
// BANCO DE DADOS
// ============================================
async function buscarCategorias() {
    const { data } = await supabase.from('categorias').select('*').order('nome');
    categoriasCache = data || [];
    return categoriasCache;
}

async function buscarCartoes() {
    if (!usuarioLogado) return [];
    const { data } = await supabase.from('cartoes').select('*').eq('admin_id', usuarioLogado.id).order('nome_cartao');
    cartoesCache = data || [];
    return cartoesCache;
}

async function buscarUsuarios() {
    if (!usuarioLogado) return [];
    const { data } = await supabase.from('usuarios').select('*');
    usuariosCache = data || [];
    return usuariosCache;
}

async function buscarGastos() {
    if (!usuarioLogado) return [];
    let query = supabase.from('gastos').select('*').eq('admin_id', usuarioLogado.id).order('data_compra', { ascending: false });
    const { data } = await query;
    todosGastos = data || [];
    return todosGastos;
}

async function inserirGasto(gasto) {
    const { data, error } = await supabase.from('gastos').insert([gasto]).select();
    if (error) throw error;
    return data[0];
}

// ============================================
// RENDERIZAÇÃO
// ============================================
async function atualizarInterface() {
    showLoading('Atualizando...');
    await Promise.all([buscarCategorias(), buscarCartoes(), buscarUsuarios(), buscarGastos()]);
    atualizarStats();
    renderizarAbas();
    hideLoading();
}

function atualizarStats() {
    const gastosAtivos = todosGastos.filter(g => g.status === 'ativo');
    const totalGastos = gastosAtivos.reduce((s, g) => s + parseFloat(g.valor_total), 0);
    const totalRenda = 0; // Simplificado
    
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-label">💰 Gastos do Mês</div><div class="stat-value">R$ ${totalGastos.toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">📦 Compras Ativas</div><div class="stat-value">${gastosAtivos.length}</div></div>
        <div class="stat-card"><div class="stat-label">💳 Cartões</div><div class="stat-value">${cartoesCache.length}</div></div>
        <div class="stat-card"><div class="stat-label">👥 Pessoas</div><div class="stat-value">${usuariosCache.length}</div></div>
    `;
}

function renderizarAbas() {
    const container = document.getElementById('tabContent');
    const dadosPaginados = todosGastos.slice((paginaAtual - 1) * ITENS_POR_PAGINA, paginaAtual * ITENS_POR_PAGINA);
    
    if (dadosPaginados.length === 0) {
        container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-light);">Nenhum gasto encontrado. Clique em <strong>➕ NOVO GASTO</strong> para começar!</p>';
        document.getElementById('pagination').innerHTML = '';
        return;
    }
    
    container.innerHTML = `<div class="card-grid">${dadosPaginados.map(g => {
        const cat = categoriasCache.find(c => c.id === g.categoria_id);
        const cart = cartoesCache.find(c => c.id === g.cartao_id);
        const user = usuariosCache.find(u => u.id === g.usuario_id);
        return `
            <div class="gasto-card" style="border-left-color: ${cart ? cart.cor : '#4a6cf7'};">
                <div class="gasto-card-header">
                    <span class="gasto-card-title">${cat ? cat.icone + ' ' + cat.nome : '📦 Outros'}</span>
                    <span class="gasto-card-valor">R$ ${parseFloat(g.valor_total).toFixed(2)}</span>
                </div>
                ${g.descricao ? `<p style="font-size:0.9rem;margin-bottom:8px;">📝 ${g.descricao}</p>` : ''}
                <div class="gasto-card-detalhes">
                    ${cart ? `💳 ${cart.nome_cartao} | ` : ''}
                    ${g.total_parcelas > 1 ? `📊 ${g.parcela_atual}/${g.total_parcelas} parcelas | ` : 'À vista | '}
                    📅 ${formatarData(g.data_compra)}
                    ${user ? ` | 👤 ${user.nome}` : ''}
                </div>
                ${g.recorrente ? '<span style="font-size:0.7rem;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:50px;">🔄 Fixo</span>' : ''}
            </div>
        `;
    }).join('')}</div>`;
    
    // Paginação
    const totalPag = Math.ceil(todosGastos.length / ITENS_POR_PAGINA);
    let pagHTML = '';
    if (totalPag > 1) {
        pagHTML += `<button onclick="mudarPagina(${paginaAtual - 1})" ${paginaAtual === 1 ? 'disabled' : ''}>⬅️</button>`;
        for (let i = 1; i <= totalPag; i++) {
            pagHTML += `<button onclick="mudarPagina(${i})" class="${i === paginaAtual ? 'active' : ''}">${i}</button>`;
        }
        pagHTML += `<button onclick="mudarPagina(${paginaAtual + 1})" ${paginaAtual === totalPag ? 'disabled' : ''}>➡️</button>`;
    }
    document.getElementById('pagination').innerHTML = pagHTML;
}

function mudarPagina(p) {
    const totalPag = Math.ceil(todosGastos.length / ITENS_POR_PAGINA);
    if (p < 1 || p > totalPag) return;
    paginaAtual = p;
    renderizarAbas();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================
// MODAL
// ============================================
function abrirModalGasto() {
    document.getElementById('modalGastoTitulo').textContent = '➕ Novo Gasto';
    document.getElementById('gastoValor').value = '';
    document.getElementById('gastoDescricao').value = '';
    document.getElementById('gastoParcelas').value = '1';
    document.getElementById('gastoData').value = new Date().toISOString().split('T')[0];
    document.getElementById('gastoRecorrente').value = 'false';
    document.getElementById('gastoVencimento').value = '';
    document.getElementById('grupoVencimento').style.display = 'none';
    
    // Preencher categorias
    const selCat = document.getElementById('gastoCategoria');
    selCat.innerHTML = '<option value="">Selecione...</option>' + categoriasCache.filter(c => c.tipo === 'gasto').map(c => `<option value="${c.id}">${c.icone} ${c.nome}</option>`).join('');
    
    // Preencher cartões
    const selCart = document.getElementById('gastoCartao');
    selCart.innerHTML = '<option value="">Sem cartão</option>' + cartoesCache.map(c => `<option value="${c.id}">💳 ${c.nome_cartao}</option>`).join('');
    
    // Preencher usuários
    const selUser = document.getElementById('gastoUsuario');
    selUser.innerHTML = '<option value="">Selecione...</option>' + usuariosCache.map(u => `<option value="${u.id}">👤 ${u.nome}</option>`).join('');
    
    document.getElementById('modalGasto').classList.add('show');
}

document.getElementById('gastoRecorrente').addEventListener('change', function() {
    document.getElementById('grupoVencimento').style.display = this.value === 'true' ? 'block' : 'none';
});

document.getElementById('btnCancelarGasto').addEventListener('click', () => {
    document.getElementById('modalGasto').classList.remove('show');
});

document.getElementById('btnSalvarGasto').addEventListener('click', async () => {
    const valor = parseFloat(document.getElementById('gastoValor').value);
    const categoria_id = document.getElementById('gastoCategoria').value;
    
    if (!valor || valor <= 0) { alert('❌ Informe o valor!'); return; }
    if (!categoria_id) { alert('❌ Selecione a categoria!'); return; }
    
    const gasto = {
        admin_id: usuarioLogado.id,
        cartao_id: document.getElementById('gastoCartao').value || null,
        usuario_id: document.getElementById('gastoUsuario').value || null,
        categoria_id: parseInt(categoria_id),
        descricao: document.getElementById('gastoDescricao').value.trim(),
        valor_total: valor,
        total_parcelas: parseInt(document.getElementById('gastoParcelas').value) || 1,
        parcela_atual: 1,
        data_compra: document.getElementById('gastoData').value,
        recorrente: document.getElementById('gastoRecorrente').value === 'true',
        dia_vencimento: document.getElementById('gastoRecorrente').value === 'true' ? parseInt(document.getElementById('gastoVencimento').value) || null : null,
        status: 'ativo'
    };
    
    showLoading('Salvando...');
    await inserirGasto(gasto);
    hideLoading();
    document.getElementById('modalGasto').classList.remove('show');
    alert('✅ Gasto salvo com sucesso!');
    paginaAtual = 1;
    atualizarInterface();
});

// ============================================
// LOGIN
// ============================================
document.getElementById('btnLogin').addEventListener('click', async () => {
    const nome = document.getElementById('loginNome').value.trim();
    const cpf = document.getElementById('loginCPF').value.trim();
    const senha = document.getElementById('loginSenha').value;
    
    if (!nome) { alert('Digite seu nome!'); return; }
    if (!cpf || !validarCPF(cpf)) { alert('CPF inválido!'); return; }
    
    showLoading('Autenticando...');
    const { data: usuarios } = await supabase.from('usuarios').select('*').eq('cpf', cpf);
    
    // Admin: nome + cpf + senha = 'admin'
    if (cpf === '12345678909' && senha === 'admin') {
        // Criar admin se não existir
        if (!usuarios || usuarios.length === 0) {
            await supabase.from('usuarios').insert([{ nome: nome, cpf: cpf, tipo: 'admin', senha: 'admin' }]);
        }
        usuarioLogado = { id: usuarios?.[0]?.id || 1, nome, cpf, tipo: 'admin' };
    } else if (usuarios && usuarios.length > 0) {
        usuarioLogado = usuarios[0];
    } else {
        // Criar usuário comum
        const { data: novo } = await supabase.from('usuarios').insert([{ nome, cpf, tipo: 'comum' }]).select();
        usuarioLogado = novo[0];
    }
    
    isAdmin = usuarioLogado.tipo === 'admin';
    hideLoading();
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('displayNome').textContent = `${usuarioLogado.nome} (${formatarCPF(usuarioLogado.cpf)})`;
    if (isAdmin) document.getElementById('badgeAdmin').classList.remove('hidden');
    
    atualizarInterface();
});

// ============================================
// EVENTOS
// ============================================
document.addEventListener('DOMContentLoaded', () => {
    // Tema
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('btnTheme').textContent = '☀️ Modo Claro';
    }
    
    document.getElementById('btnTheme').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('btnTheme').textContent = isDark ? '☀️ Modo Claro' : '🌙 Modo Escuro';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
    
    document.getElementById('btnLogout').addEventListener('click', () => {
        if (confirm('Sair do sistema?')) {
            usuarioLogado = null;
            isAdmin = false;
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }
    });
    
    document.getElementById('btnNovoGasto').addEventListener('click', abrirModalGasto);
    
    // Abas
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            tabAtual = tab.dataset.tab;
            paginaAtual = 1;
            renderizarAbas();
        });
    });
    
    // Enter no login
    ['loginNome', 'loginCPF', 'loginSenha'].forEach(id => {
        document.getElementById(id)?.addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('btnLogin').click();
        });
    });
    
    console.log('✅ Controle Financeiro v1.0 pronto!');
});
</script>
</body>
</html>
